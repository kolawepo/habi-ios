name: Habi
options:
  bundleIdPrefix: com.habi
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

targets:
  Habi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Habi
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.habi.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Habi
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        CODE_SIGN_ENTITLEMENTS: Habi/Habi.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VBYWAWASG7
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - target: HabiWidgetExtension
        embed: true
        codeSign: true

  HabiWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HabiWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.habi.ios.widget
        INFOPLIST_FILE: HabiWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: HabiWidget/HabiWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VBYWAWASG7
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  Habi:
    build:
      targets:
        Habi: all
        HabiWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
